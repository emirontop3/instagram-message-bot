<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emirattaa Bot Merkezi</title>
    <style>
        body { background: #0a0a0a; color: #00ff00; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .panel { border: 1px solid #00ff00; padding: 30px; border-radius: 10px; text-align: center; background: #111; box-shadow: 0 0 15px #00ff0022; }
        input { padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #00ff00; width: 80%; outline: none; }
        input:focus { border-color: #00ff00; }
        button { padding: 12px 25px; background: #00ff00; color: #000; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #00cc00; box-shadow: 0 0 10px #00ff00; }
        #log { margin-top: 20px; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>
    <div class="panel">
        <h2>INSTA-BOT v3</h2>
        <input type="text" id="target" placeholder="@hedef_kullanici" autocomplete="off">
        <br>
        <button onclick="fire()" id="btn">TAKİP ET</button>
        <div id="log">Sistem hazır.</div>
    </div>

    <script>
        async function fire() {
            const log = document.getElementById('log');
            const btn = document.getElementById('btn');
            const target = document.getElementById('target').value;

            if(!target) { log.innerText = "Lütfen bir hedef girin."; return; }

            btn.disabled = true;
            btn.style.opacity = "0.5";
            log.innerText = "Sunucuya bağlanılıyor, bekle...";

            try {
                // Rota doğrudan vercel.json ile api/index.py'a yönlendirilecek
                const response = await fetch('/api/follow', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ target: target })
                });
                
                const result = await response.json();
                log.innerText = result.message;
                log.style.color = response.ok ? "#00ff00" : "#ff4444";
            } catch (error) {
                log.innerText = "HATA: Sunucu yanıt vermedi veya zaman aşımı.";
                log.style.color = "#ff4444";
            } finally {
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        }
    </script>
</body>
</html>
