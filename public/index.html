<div class="panel">
    <h2>INSTA-BOT v4 (Takip + DM)</h2>
    <input type="text" id="target" placeholder="@hedef_kullanici" autocomplete="off">
    <br>
    <input type="text" id="msg" placeholder="Gönderilecek mesaj..." value="Selam!">
    <br>
    <button onclick="fire()" id="btn">OPERASYONU BAŞLAT</button>
    <div id="log">Sistem hazır.</div>
</div>

<script>
    async function fire() {
        const log = document.getElementById('log');
        const btn = document.getElementById('btn');
        const target = document.getElementById('target').value;
        const msg = document.getElementById('msg').value;

        if(!target) { log.innerText = "Lütfen bir hedef girin."; return; }

        btn.disabled = true;
        log.innerText = "Sızılıyor ve mesaj gönderiliyor...";

        try {
            const response = await fetch('/api/follow', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ target: target, message: msg })
            });
            
            const result = await response.json();
            log.innerText = result.message;
            log.style.color = response.ok ? "#00ff00" : "#ff4444";
        } catch (error) {
            log.innerText = "HATA: Sunucu zaman aşımına uğradı.";
            log.style.color = "#ff4444";
        } finally {
            btn.disabled = false;
        }
    }
</script>
